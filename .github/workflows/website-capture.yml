name: website-capture

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Full URL of the website to capture'
        required: true
        type: string
      output_type:
        description: 'Output format(s)'
        required: true
        type: choice
        default: 'both'
        options:
          - pdf
          - md
          - both

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Always install both pdf-lib and turndown (lightweight)
      - name: Install Node dependencies
        run: |
          npm init -y > /dev/null
          npm install playwright pdf-lib turndown

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Capture, merge and generate files
        env:
          OUTPUT_TYPE: ${{ github.event.inputs.output_type }}
        run: node .github/script/website-capture.js "${{ github.event.inputs.url }}"

      - name: Upload to website folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          mkdir -p website

          # Move files that exist (PDF and/or MD)
          if [ -f output.pdf ]; then
            mv output.pdf website/${FILENAME}.pdf
          fi
          if [ -f output.md ]; then
            mv output.md website/${FILENAME}.md
          fi
          # The media folder (if created) is already inside website/content

          FILES=(website/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No files to upload."
            exit 0
          fi

          git add website/
          git commit -m "Add website capture for ${{ github.event.inputs.url }} [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Push rejected, retrying in 3 seconds..."
                sleep 3
              else
                echo "Push failed after $RETRIES attempts."
                exit 1
              fi
            fi
          done
          echo "All files uploaded to the 'website' folder."
